server {
    listen 80;
    listen [::]:80;
    server_name 147.45.75.59 localhost 127.0.0.1;

    location /api/ {
        proxy_pass http://127.0.0.1:3010/;
        proxy_set_header Host $host;
    }

    location / {
        auth_basic "Command Center";
        auth_basic_user_file /etc/nginx/.htpasswd;
        root /var/www/dashboard;
        index index.html;
    }
}
